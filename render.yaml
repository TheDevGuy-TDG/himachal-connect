services:
  - type: web
    name: himachal-connect
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
